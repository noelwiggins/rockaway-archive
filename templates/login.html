{% extends "base.html" %}
{% block title %}Sign in — {{ site_name }}{% endblock %}
{% block content %}
<div class="form-wrap">
  <h1 class="page-heading">Sign in</h1>
  <p class="page-sub">PIN required to add, edit, or remove photos.</p>
  <form method="post">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-field">
      <label>PIN</label>
      <input type="password" name="pin" inputmode="numeric" autofocus>
    </div>
    <button type="submit" class="btn-primary">Enter</button>
  </form>
</div>
{% endblock %}
